# Email Agent Rules and Priority Classification

## Overview
This document defines the rules for email classification, priority assignment, and automated actions.

## Priority Levels

### CRITICAL (Immediate Reminder)
**Score Threshold:** >= 0.8

**Keywords:**
- urgent, emergency, asap, immediately, critical
- deadline today, action required now
- server down, outage, incident
- payment overdue, legal notice
- security alert, breach

**Actions:**
- ✅ Create immediate reminder
- 🔔 High-priority notification
- 📌 Pin to top of reminders list
- ⚠️ Consider sending SMS/desktop notification (future)

**Examples:**
- "URGENT: Server Down - Immediate Action Required"
- "Emergency Meeting Today at 3 PM"
- "CRITICAL: Payment Overdue - Account Suspension"

---

### IMPORTANT (Create Reminder)
**Score Threshold:** >= 0.6

**Keywords:**
- meeting, deadline, review, approval
- important, action required, please respond
- reply needed, tomorrow, this week
- schedule, appointment, interview
- project update, milestone

**Actions:**
- ✅ Create reminder
- 📝 Add to pending reminders list
- 📌 Show in daily summary

**Examples:**
- "Meeting Request: Project Review Tomorrow"
- "Deadline Approaching: Q4 Report Due Friday"
- "Action Required: Please Review Document"

---

### NORMAL (Summary Only)
**Score Threshold:** >= 0.3

**Characteristics:**
- Regular business emails
- Informational updates
- Non-urgent requests
- General correspondence

**Actions:**
- 📄 Generate summary only
- ❌ No reminder created
- 📊 Include in daily digest

**Examples:**
- "Weekly Team Update"
- "Project Status Report"
- "Question About Documentation"

---

### LOW (Brief Summary, No Reminder)
**Score Threshold:** < 0.3

**Keywords:**
- newsletter, promotion, unsubscribe
- marketing, sale, offer, discount
- bulk, automated, notification
- social media, update, feed

**Actions:**
- 📄 Generate brief summary (50 words max)
- ❌ No reminder
- 🗑️ Consider auto-archiving (optional)

**Examples:**
- "Your Weekly Newsletter from TechCrunch"
- "Special Offer: 50% Off All Products"
- "Automated Receipt for Your Purchase"

---

## Sender-Based Rules

### VIP Senders (Auto-Escalate Priority)
Configure VIP senders in config.yaml:
```yaml
vip_senders:
  - boss@company.com
  - ceo@company.com
  - important-client@client.com
```

**Rule:** Emails from VIP senders are automatically escalated one priority level (LOW → NORMAL, NORMAL → IMPORTANT).

### Domain Rules
```yaml
domain_rules:
  # Auto-low priority domains
  low_priority_domains:
    - newsletters.company.com
    - notifications.social.com
  
  # Auto-high priority domains
  high_priority_domains:
    - company.com (internal)
    - important-client.com
```

---

## Time-Based Rules

### Business Hours
```yaml
business_hours:
  start: 09:00
  end: 18:00
  timezone: UTC
  work_days: [Mon, Tue, Wed, Thu, Fri]
```

**Rules:**
- Emails received outside business hours with NORMAL/LOW priority → Hold until next business day
- CRITICAL/IMPORTANT emails → Notify immediately regardless of time

### Weekend Handling
- NORMAL/LOW priority emails → Batch for Monday morning summary
- CRITICAL/IMPORTANT emails → Process normally

