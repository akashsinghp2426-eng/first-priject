## Reply Generation Rules

### Style Guidelines

**Professional:**
- Formal tone
- Complete sentences
- Proper greeting and signature
- Use for: Business communications, clients, management

**Casual:**
- Friendly tone
- Can use contractions
- Brief but complete
- Use for: Colleagues, familiar contacts

**Concise:**
- Very brief
- Get straight to point
- Minimal pleasantries
- Use for: Quick confirmations, routine responses

### Auto-Reply Conditions
```yaml
auto_reply:
  enabled: false  # Disabled by default for safety
  
  # Conditions for auto-reply (if enabled)
  conditions:
    - sender_in_contacts: true
    - priority: NORMAL
    - email_type: informational
    - requires_response: false
```

**⚠️ WARNING:** Auto-reply is disabled by default. Always review before sending!

---

## Content Analysis Rules

### Urgency Detection
Increase priority score if email contains:
- Time expressions: "today", "tomorrow", "by EOD", "within 2 hours"
- Urgent markers: "!", "URGENT", "ASAP"
- Action verbs: "need", "require", "must", "should"

### Sentiment Analysis
- Negative sentiment + action words → Increase priority
- Positive sentiment + informational → Decrease priority

### Thread Position
- First email in thread → Normal processing
- Reply in active thread → Check for unanswered questions
- Long thread (>5 messages) → Summarize entire conversation

---

## Exception Handling

### False Positives
If an email is incorrectly classified:
1. User can manually adjust priority
2. System learns from correction (future ML feature)
3. Add sender/domain to exception list

### False Negatives
If important email missed:
1. Check spam/junk folder manually
2. Add sender to VIP list
3. Create custom rule for similar emails

---

## Security Rules

### Never Auto-Reply To:
- Emails from unknown senders
- Emails marked as spam
- Emails with suspicious links/attachments
- Emails requesting sensitive information

### Red Flags (Mark for Manual Review):
- Requests for passwords or credentials
- Unexpected attachments from known contacts
- Links to unfamiliar domains
- Poor grammar/spelling in business context
- Urgent financial requests

---

## Customization

### Adding Custom Rules
Edit `config/rules.yaml`:
```yaml
custom_rules:
  - name: "Project Alpha Emails"
    condition:
      subject_contains: ["Project Alpha", "Alpha Initiative"]
      OR:
        sender_domain: "alpha-project.com"
    action:
      priority: IMPORTANT
      add_label: "Project Alpha"
  
  - name: "Invoice Emails"
    condition:
      subject_contains: ["invoice", "receipt", "payment"]
    action:
      priority: IMPORTANT
      create_reminder: true
      reminder_note: "Follow up on payment"
```

### Disabling Rules
```yaml
disabled_rules:
  - rule_name_1
  - rule_name_2
```

---

## Testing Rules

### Test Mode
Run agent in test mode to see how emails would be classified:
```bash
python main.py --test-rules
```

### Rule Validation
Before deploying new rules:
1. Run on historical emails (last 100)
2. Review classification accuracy
3. Adjust thresholds as needed
4. Deploy to production

